plugins {
    id 'java'
    id 'application'
    id 'com.gradleup.shadow' version '8.3.10'
}

group = 'ru.voidrp'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

repositories {
    mavenCentral()
}

// Include JavaFX for ALL platforms so the fat JAR works on Windows, Linux, and Mac
def javafxVersion = '21.0.5'
def javafxModules = ['base', 'graphics', 'controls', 'fxml']
def javafxPlatforms = ['win', 'linux', 'mac', 'mac-aarch64']

dependencies {
    javafxModules.each { module ->
        javafxPlatforms.each { platform ->
            implementation "org.openjfx:javafx-${module}:${javafxVersion}:${platform}"
        }
    }

    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.2'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.17.2'
}

application {
    mainClass = 'ru.voidrp.launcher.Main'
}

shadowJar {
    archiveBaseName = 'voidrp-launcher'
    archiveClassifier = ''
    archiveVersion = project.version
    mergeServiceFiles()
    manifest {
        attributes(
            'Main-Class': 'ru.voidrp.launcher.Main',
            'Add-Opens': 'java.base/java.lang=ALL-UNNAMED java.base/java.nio=ALL-UNNAMED'
        )
    }
    // Deduplicate identical native .so/.dll files across platforms
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

compileJava.options.encoding = 'UTF-8'
